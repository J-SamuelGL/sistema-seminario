services:
  piston:
    image: ghcr.io/engineer-man/piston
    container_name: piston
    restart: unless-stopped
    privileged: true
    environment:
      - PISTON_RUN_TIMEOUT=5000
    volumes:
      - ./piston/packages:/piston/packages
    tmpfs:
      - /piston/jobs:exec
    expose:
      - '2000'

  proxy:
    image: caddy:2-alpine
    container_name: piston_proxy
    restart: unless-stopped
    depends_on:
      - piston
    ports:
      - '80:80'
      - '443:443'
    environment:
      - PISTON_API_KEY=${PISTON_API_KEY}
      - SITE_ADDRESS=${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
